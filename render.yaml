# Render.com Blueprint for the RPSLS multiplayer server.
#
# Deploy in 3 clicks:
#   1. Push this file to your repo (already done).
#   2. Go to https://dashboard.render.com/blueprints
#   3. "New Blueprint Instance" → pick the Alex-Lou/RPSLS repo → Apply.
#
# Render will build the Dockerfile and expose a public HTTPS URL.
# Free plan: 750h/mo, sleeps after 15min of inactivity, ~30s to wake.

services:
  - type: web
    name: rpsls-server
    runtime: docker
    plan: free
    region: frankfurt        # change to "oregon" / "singapore" / etc. if you prefer
    dockerfilePath: ./crates/rpsls-server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: RUST_LOG
        value: info,rpsls_server=debug
      # "Sign in with Google" — the OAuth Web client id(s) we accept as the ID
      # token audience. PUBLIC value (not a secret), safe to commit. Comma-
      # separated if several (e.g. web + extra). Must match the app's
      # VITE_GOOGLE_CLIENT_ID. Unset = google sign-in stays disabled (fail-closed).
      - key: GOOGLE_OAUTH_CLIENT_IDS
        value: 353076917557-g7a0ig22ku14bg5rgab5sfc6sojfdfe1.apps.googleusercontent.com
      # PORT is provided automatically by Render and read by the server.
