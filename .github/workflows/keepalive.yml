name: keep-alive

# Keeps the Render free-tier server awake so the first player never hits a
# 30-50s cold start. Render idles after ~15 min of inactivity; we ping every
# 5 min for margin (GitHub's scheduled runs are best-effort and can be delayed).
#
# IMPORTANT: scheduled workflows only run from the repository's DEFAULT branch
# (here: main), so this starts pinging once this file is on main.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (wakes the instance if it was asleep)
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://rpsls-server-tptj.onrender.com/health || echo "000")
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "::error::server did not return 200 after 5 attempts"
          exit 1
