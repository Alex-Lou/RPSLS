# Deploys landing/ to GitHub Pages whenever main is updated.
#
# One-time setup (done via API):
#   Settings → Pages → Build & deployment → Source: GitHub Actions
#
# Resulting URL: https://alex-lou.github.io/RPSLS/

name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing.yml"
  workflow_dispatch:

# Allow one concurrent deployment, never cancel an in-flight one — Pages
# rejects parallel deploys.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload landing/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
